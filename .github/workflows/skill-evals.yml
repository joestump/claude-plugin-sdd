name: Skill Evaluations

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'references/**'
      - 'evals/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Eval mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - pipeline

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  determine-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      changed-skills: ${{ steps.changes.outputs.skills }}
      run-tier3: ${{ steps.changes.outputs.run-tier3 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine eval mode
        id: mode
        run: |
          MODE="quick"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" == "full" ]]; then
            MODE="full"
          fi
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q "full-eval"; then
              MODE="full"
            fi
            if [[ "${{ github.base_ref }}" == release/* ]]; then
              MODE="full"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Eval mode: $MODE"

      - name: Detect changed skills
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED_FILES=$(git diff --name-only "$BASE" "$HEAD")
          else
            CHANGED_FILES=""
          fi

          # Extract skill names from changed paths (skills/{name}/**)
          SKILLS=$(echo "$CHANGED_FILES" | grep '^skills/' | sed 's|^skills/\([^/]*\)/.*|\1|' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # If evals.json, eval triggers, or references changed, treat all skills as changed
          # evals/pipeline/ and evals/benchmarks/ are meta-files — changes there don't affect skill eval coverage
          if echo "$CHANGED_FILES" | grep -qE '^(evals/evals\.json|evals/triggers/|references/)'; then
            SKILLS='["all"]'
          fi

          if [[ -z "$SKILLS" || "$SKILLS" == "[]" ]]; then
            SKILLS='[]'
          fi

          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"
          echo "Changed skills: $SKILLS"

          # Determine if any Tier 3 skill changed (or all skills should run)
          TIER3_SKILLS=("adr" "init" "prime" "list" "status" "organize" "enrich")
          RUN_TIER3="false"
          if echo "$SKILLS" | jq -e 'contains(["all"])' > /dev/null 2>&1; then
            RUN_TIER3="true"
          else
            for skill in "${TIER3_SKILLS[@]}"; do
              if echo "$SKILLS" | jq -e --arg s "$skill" 'contains([$s])' > /dev/null 2>&1; then
                RUN_TIER3="true"
                break
              fi
            done
          fi
          echo "run-tier3=$RUN_TIER3" >> "$GITHUB_OUTPUT"
          echo "Run tier3 evals: $RUN_TIER3"

  eval-tier3:
    needs: determine-mode
    if: needs.determine-mode.outputs.run-tier3 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Tier 3 evals
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run eval prompts from evals/tier3.json for Tier 3 skills (adr, init, prime, list, status, organize, enrich).

            For each eval entry:
            1. Read the eval prompt and assertions
            2. Invoke the skill with the test prompt
            3. Verify each assertion against the output
            4. Record pass/fail for each assertion

            Output results as JSON to eval-results/tier3.json with this structure:
            {
              "tier": 3,
              "timestamp": "<ISO 8601>",
              "results": [
                {
                  "eval_id": <number>,
                  "skill": "<name>",
                  "passed": <boolean>,
                  "assertions": [
                    { "text": "<assertion>", "passed": <boolean>, "reason": "<why>" }
                  ]
                }
              ],
              "summary": { "total": <n>, "passed": <n>, "failed": <n>, "pass_rate": <float> }
            }

      - name: Upload Tier 3 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-tier3
          path: eval-results/tier3.json
          if-no-files-found: warn

  eval-changed:
    needs: determine-mode
    if: needs.determine-mode.outputs.changed-skills != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run evals for changed skills
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run eval prompts from evals/evals.json for these changed skills: ${{ needs.determine-mode.outputs.changed-skills }}.

            If the list is ["all"], run evals for all skills in evals/evals.json.
            Otherwise, filter to only the listed skill names.

            For each eval entry:
            1. Read the eval prompt and assertions
            2. Invoke the skill with the test prompt
            3. Verify each assertion against the output
            4. Record pass/fail for each assertion

            Output results as JSON to eval-results/changed.json with this structure:
            {
              "tier": "changed",
              "timestamp": "<ISO 8601>",
              "skills_evaluated": [<list of skill names>],
              "results": [
                {
                  "eval_id": <number>,
                  "skill": "<name>",
                  "passed": <boolean>,
                  "assertions": [
                    { "text": "<assertion>", "passed": <boolean>, "reason": "<why>" }
                  ]
                }
              ],
              "summary": { "total": <n>, "passed": <n>, "failed": <n>, "pass_rate": <float> }
            }

      - name: Upload changed skill results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-changed
          path: eval-results/changed.json
          if-no-files-found: warn

  eval-full:
    needs: determine-mode
    if: needs.determine-mode.outputs.mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run full eval suite
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run ALL eval prompts from evals/evals.json across all 15 skills.

            For each eval entry:
            1. Read the eval prompt and assertions
            2. Invoke the skill with the test prompt
            3. Verify each assertion against the output
            4. Record pass/fail for each assertion

            Output results as JSON to eval-results/full.json with this structure:
            {
              "tier": "full",
              "timestamp": "<ISO 8601>",
              "results": [
                {
                  "eval_id": <number>,
                  "skill": "<name>",
                  "tier": <1|2|3>,
                  "passed": <boolean>,
                  "assertions": [
                    { "text": "<assertion>", "passed": <boolean>, "reason": "<why>" }
                  ]
                }
              ],
              "summary": {
                "total": <n>, "passed": <n>, "failed": <n>, "pass_rate": <float>,
                "by_tier": {
                  "1": { "total": <n>, "passed": <n>, "pass_rate": <float> },
                  "2": { "total": <n>, "passed": <n>, "pass_rate": <float> },
                  "3": { "total": <n>, "passed": <n>, "pass_rate": <float> }
                }
              }
            }

      - name: Upload full eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-full
          path: eval-results/full.json
          if-no-files-found: warn

  eval-pipeline:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'pipeline') ||
      (github.event_name == 'pull_request' && startsWith(github.base_ref, 'release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run pipeline scenarios
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run every scenario in evals/pipeline/*.json against a disposable
            test repository, per SPEC-0017 REQ "Cross-Skill Pipeline Testing".

            For each scenario file:
            1. Read the scenario JSON (id, description, setup, steps,
               final_assertions).
            2. Create a disposable test repo per setup.repo_strategy:
               - "local-tmp-init": mktemp -d, cd into it, git init, write
                 setup.seed.claude_md to ./CLAUDE.md, write each
                 setup.seed.files entry, git add + initial commit.
               - "gh-disposable": gh repo create --private joestump/sdd-eval-{id}-{run-id},
                 seed from setup.seed via local push, record repo name for cleanup.
            3. Execute each step in order:
               a. cd into the test repo.
               b. Invoke the named skill via the matching slash command
                  (e.g., step.skill="spec" -> /sdd:spec) using step.prompt.
               c. Check each assertion in step.verify against the repo
                  state. Record pass/fail with a short reason.
               d. If a verify check fails, record it but continue to the
                  next step so we surface as much information as possible.
            4. Run final_assertions against the final repo state.
            5. Clean up:
               - local-tmp-init: rm -rf the temp dir.
               - gh-disposable: gh repo delete --yes the created repo.

            Output results to eval-results/pipeline.json:
            {
              "tier": "pipeline",
              "timestamp": "<ISO 8601>",
              "scenarios": [
                {
                  "id": "<scenario-id>",
                  "passed": <boolean>,
                  "steps": [
                    {
                      "step": <number>,
                      "skill": "<name>",
                      "passed": <boolean>,
                      "verify_results": [
                        { "text": "<assertion>", "passed": <boolean>, "reason": "<why>" }
                      ]
                    }
                  ],
                  "final_assertion_results": [
                    { "text": "<assertion>", "passed": <boolean>, "reason": "<why>" }
                  ]
                }
              ],
              "summary": { "scenarios": <n>, "passed": <n>, "failed": <n> }
            }

            IMPORTANT: pipeline scenarios MUST NOT push branches, open PRs,
            or create issues against any real tracker. The seeded CLAUDE.md
            in each scenario configures the tasks.md fallback to enforce
            this. If you detect outbound calls to api.github.com,
            gitea.*, or gitlab.*, fail the scenario and record the
            attempted call in the verify_results.

      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-pipeline
          path: eval-results/pipeline.json
          if-no-files-found: warn

  report:
    needs: [determine-mode, eval-tier3, eval-changed, eval-full, eval-pipeline]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all eval results
        uses: actions/download-artifact@v4
        with:
          pattern: eval-results-*
          path: eval-results
          merge-multiple: true

      - name: Aggregate results and post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVAL_MODE: ${{ needs.determine-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import json, os, sys, subprocess
          from pathlib import Path

          results_dir = Path('eval-results')
          results_dir.mkdir(exist_ok=True)

          # --- Load result files ---
          shape_a = []   # per-skill eval files
          pipeline_data = None

          for fpath in sorted(results_dir.glob('*.json')):
              if fpath.name == 'summary.json':
                  continue
              try:
                  data = json.loads(fpath.read_text())
              except Exception as e:
                  print(f'Warning: could not parse {fpath.name}: {e}')
                  continue
              if 'scenarios' in data:
                  pipeline_data = data
              elif 'results' in data:
                  file_tier = data.get('tier', '?')
                  for r in data['results']:
                      r.setdefault('_tier', file_tier)
                  shape_a.extend(data['results'])

          # --- Aggregate shape-A by skill ---
          skill_stats = {}
          tier_stats = {}

          for entry in shape_a:
              skill = entry.get('skill', 'unknown')
              tier = str(entry.get('_tier', '?'))
              passed = bool(entry.get('passed', False))

              if skill not in skill_stats:
                  skill_stats[skill] = {'tier': tier, 'total': 0, 'passed': 0}
              skill_stats[skill]['total'] += 1
              if passed:
                  skill_stats[skill]['passed'] += 1

              if tier not in tier_stats:
                  tier_stats[tier] = {'total': 0, 'passed': 0}
              tier_stats[tier]['total'] += 1
              if passed:
                  tier_stats[tier]['passed'] += 1

          total = sum(s['total'] for s in skill_stats.values())
          total_passed = sum(s['passed'] for s in skill_stats.values())
          overall_rate = total_passed / total if total > 0 else 1.0

          # --- Build markdown comment ---
          mode = os.environ.get('EVAL_MODE', 'quick')
          lines = ['## Skill Eval Results', '']

          if total > 0:
              lines.append(f'**Mode:** `{mode}` | **Overall:** {total_passed}/{total} ({overall_rate:.0%})')
          else:
              lines.append(f'**Mode:** `{mode}` | No eval results found.')
          lines.append('')

          if skill_stats:
              lines += [
                  '| Skill | Tier | Evals | Passed | Rate |',
                  '|-------|------|-------|--------|------|',
              ]
              for skill, s in sorted(skill_stats.items()):
                  rate = s['passed'] / s['total'] if s['total'] else 0
                  icon = '✅' if rate >= 0.8 else '❌'
                  lines.append(f"| `{skill}` | {s['tier']} | {s['total']} | {s['passed']} | {icon} {rate:.0%} |")
              lines.append('')

          if len(tier_stats) > 1:
              lines.append('**By tier:**')
              for tier, s in sorted(tier_stats.items()):
                  rate = s['passed'] / s['total'] if s['total'] else 0
                  lines.append(f'- Tier {tier}: {s["passed"]}/{s["total"]} ({rate:.0%})')
              lines.append('')

          if pipeline_data:
              scenarios = pipeline_data.get('scenarios', [])
              p_passed = sum(1 for s in scenarios if s.get('passed'))
              lines += [f'### Pipeline Scenarios ({p_passed}/{len(scenarios)} passed)', '']
              for sc in scenarios:
                  icon = '✅' if sc.get('passed') else '❌'
                  lines.append(f'- {icon} `{sc.get("id", "unknown")}`')
              lines.append('')

          tier1 = tier_stats.get('1', {})
          tier1_rate = tier1.get('passed', 0) / tier1['total'] if tier1.get('total') else 1.0
          if tier1.get('total', 0) > 0 and tier1_rate < 0.8:
              lines.append(f'> ⚠️ **Tier 1 pass rate {tier1_rate:.0%} is below the 80% threshold.**')
              lines.append('')

          comment = '\n'.join(lines)
          print(comment)

          # --- Post PR comment ---
          pr = os.environ.get('PR_NUMBER', '')
          if pr:
              subprocess.run(
                  ['gh', 'pr', 'comment', pr, '--body', comment],
                  check=True,
              )

          # --- Write summary.json ---
          summary = {
              'total': total,
              'passed': total_passed,
              'pass_rate': overall_rate,
              'by_tier': {
                  t: {
                      'total': s['total'],
                      'passed': s['passed'],
                      'pass_rate': s['passed'] / s['total'] if s['total'] else 0,
                  }
                  for t, s in tier_stats.items()
              },
          }
          if pipeline_data:
              scenarios = pipeline_data.get('scenarios', [])
              summary['pipeline'] = {
                  'scenarios': len(scenarios),
                  'passed': sum(1 for s in scenarios if s.get('passed')),
              }
          (results_dir / 'summary.json').write_text(json.dumps(summary, indent=2))

          # Fail if Tier 1 below threshold
          if tier1.get('total', 0) > 0 and tier1_rate < 0.8:
              sys.exit(1)
          EOF

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-summary
          path: eval-results/summary.json
          if-no-files-found: warn

      - name: Check Tier 1 threshold
        if: always()
        run: |
          if [ -f eval-results/summary.json ]; then
            TIER1_RATE=$(python3 -c "
          import json
          with open('eval-results/summary.json') as f:
              data = json.load(f)
          tier1 = data.get('by_tier', {}).get('1', {})
          print(tier1.get('pass_rate', 1.0))
          " 2>/dev/null || echo "1.0")
            echo "Tier 1 pass rate: $TIER1_RATE"
            if python3 -c "exit(0 if float('$TIER1_RATE') >= 0.8 else 1)" 2>/dev/null; then
              echo "Tier 1 threshold met (>= 80%)"
            else
              echo "::error::Tier 1 pass rate ($TIER1_RATE) is below 80% threshold"
              exit 1
            fi
          else
            echo "No summary.json — no Tier 1 evals ran, skipping threshold check"
          fi
